<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website</title>
    <link rel="stylesheet" href="task.css">
</head>
<body>

    <!-- Navbar -->
    <nav>
        <a href="#">Dog</a>
        <a href="#">Image</a>
        <a href="#">Video</a>
    </nav>

    <!-- Heading -->
    <h1>Responsive Website</h1>

    <!-- Image -->
    <img src="image1.jpg" alt="Image">

    <!-- Video -->
    <video controls>
        <source src="dogvideo.mp4" type="video/mp4">
    </video>

    <!-- Table -->
     <h2>Dog Activities</h2>
    <table>
        <tr>
            <th>1</th>
            <th>2</th>
            <th>3</th>
        </tr>
        <tr>
            <td>Eating</td>
            <td>Sleeping</td>
            <td>Walking</td>
        </tr>
        <tr>
            <td>Playing</td>
            <td>Running</td>
            <td>Tug of war</td>
        </tr>
    </table>

    <!-- Button -->
    <button>Click Me</button>

    <!-- Grid -->

    <h3>Grid Container</h3>
    <div class="grid-container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
    </div>

</body>
</html>
